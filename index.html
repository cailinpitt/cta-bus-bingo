<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CTA Bus Bingo</title>
    <!-- Apply the saved/system theme before paint so there's no flash. Dark is
         the CSS default; add the `light` class when light mode is in effect. -->
    <script>
      (function () {
        try {
          var s = localStorage.getItem('theme');
          var light = s ? s === 'light' : window.matchMedia('(prefers-color-scheme: light)').matches;
          if (light) document.documentElement.classList.add('light');
        } catch (e) {}
      })();
    </script>
    <meta name="description" content="Plan a Chicago trip that chains together as many unridden CTA bus routes as possible." />
    <meta name="theme-color" content="#0d1117" />

    <!-- Icons -->
    <!-- ?v=2 cache-busts the previous off-center icon that iOS Safari held onto
         across home-screen reinstalls. Bump on future icon changes. -->
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%icon.svg?v=2" />
    <link rel="icon" type="image/png" sizes="32x32" href="%BASE_URL%favicon-32.png?v=2" />
    <link rel="icon" type="image/png" sizes="48x48" href="%BASE_URL%favicon-48.png?v=2" />
    <link rel="apple-touch-icon" href="%BASE_URL%apple-touch-icon.png?v=2" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Bus Bingo" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="CTA Bus Bingo" />
    <meta property="og:description" content="Plan a Chicago trip that chains together as many unridden CTA bus routes as possible." />
    <meta property="og:image" content="%BASE_URL%og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="CTA Bus Bingo" />
    <meta name="twitter:description" content="Plan a Chicago trip that chains together as many unridden CTA bus routes as possible." />
    <meta name="twitter:image" content="%BASE_URL%og.png" />
  </head>
  <body class="bg-gh-canvas text-gh-muted">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
