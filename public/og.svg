<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="route" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="50%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative chained "route" across the top -->
  <path d="M 80 140 Q 300 80, 520 140 T 960 140 L 1120 100"
        stroke="url(#route)" stroke-width="10" fill="none" stroke-linecap="round"/>
  <circle cx="80"   cy="140" r="14" fill="#facc15" stroke="#0d1117" stroke-width="3"/>
  <circle cx="520"  cy="140" r="10" fill="#34d399" stroke="#0d1117" stroke-width="3"/>
  <circle cx="960"  cy="140" r="10" fill="#f97316" stroke="#0d1117" stroke-width="3"/>
  <circle cx="1120" cy="100" r="14" fill="#ef4444" stroke="#fff"    stroke-width="3"/>

  <!-- Title -->
  <text x="80" y="320" font-family="Inter, system-ui, -apple-system, Segoe UI, sans-serif"
        font-size="108" font-weight="800" fill="#ffffff" letter-spacing="-2">
    CTA Bus Bingo
  </text>

  <!-- Subtitle -->
  <text x="80" y="400" font-family="Inter, system-ui, -apple-system, Segoe UI, sans-serif"
        font-size="36" font-weight="500" fill="#8b949e">
    Plan a trip that chains as many unridden
  </text>
  <text x="80" y="448" font-family="Inter, system-ui, -apple-system, Segoe UI, sans-serif"
        font-size="36" font-weight="500" fill="#8b949e">
    CTA bus routes as possible.
  </text>

  <!-- Sample route badges — pick three visually varied bus routes so the
       card previews what the planner outputs. No trains: the app caps on
       bus rides, not train rides. -->
  <g font-family="Inter, system-ui, -apple-system, Segoe UI, sans-serif" font-size="26" font-weight="700">
    <rect x="80"  y="520" width="100" height="44" rx="8" fill="#1f6feb"/>
    <text x="130" y="552" fill="#ffffff" text-anchor="middle">151</text>

    <rect x="200" y="520" width="100" height="44" rx="8" fill="#238636"/>
    <text x="250" y="552" fill="#ffffff" text-anchor="middle">X9</text>

    <rect x="320" y="520" width="100" height="44" rx="8" fill="#db6d28"/>
    <text x="370" y="552" fill="#ffffff" text-anchor="middle">49</text>

    <!-- "{busRoutesMinusThree} more" placeholder — render-og.js substitutes
         the actual bus-route count from public/data/meta.json so the OG
         stays accurate after every build-index run. -->
    <text x="440" y="552" fill="#8b949e" font-size="24" font-weight="500">+ {{BUS_MORE}} more</text>
  </g>
</svg>
